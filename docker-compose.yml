# Stack: optional in-container vLLM (GPU) + Next.js chat UI (shadcn) that proxies to OpenAI-compatible API.
#
# Chat UI only (vLLM on host, e.g. conda):  docker compose up -d web
# Full stack (GPU machine):               docker compose --profile with-vllm up -d
#
# From the UI container, the host is reachable as host.docker.internal (Linux: extra_hosts below).

services:
  vllm:
    profiles: ["with-vllm"]
    image: vllm/vllm-openai:latest
    container_name: vllm-openai
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    shm_size: "4gb"
    ipc: host
    gpus: all
    # Flags aligned with the stock `vllm/vllm-openai` image (see vLLM Docker docs).
    # The custom `examples/Dockerfile.vllm` image adds mods, FP8, tool-call-parser, etc.;
    # enable those only if you build that image and point `image:` at it.
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen3.6-35B-A3B}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--trust-remote-code"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${MAX_MODEL_LEN:-32768}"
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - "--max-num-batched-tokens"
      - "${MAX_NUM_BATCHED_TOKENS:-16384}"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      # When both services run, use http://vllm:8000/v1. Override in .env if vLLM is on the host.
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      VLLM_API_KEY: ${VLLM_API_KEY:-sk-local-edge}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3.6-35B-A3B}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  huggingface_cache:
