# Qwen/Qwen3.5-2B with official vLLM OpenAI image (same idea as vLLM Docker docs).
# https://docs.vllm.ai/en/latest/deployment/docker.html
#
# Requires: NVIDIA GPU + drivers, Docker with GPU (e.g. WSL2 + NVIDIA Container Toolkit on Windows).
#
# Start:  docker compose up -d
# Logs:  docker compose logs -f
# Stop:  docker compose down
#
# Equivalent to:
#   docker run --runtime nvidia --gpus all -v ~/.cache/huggingface:/root/.cache/huggingface \
#     --env HF_TOKEN=$HF_TOKEN -p 8000:8000 --ipc=host vllm/vllm-openai:latest --model Qwen/Qwen3.5-2B
#
# API: http://localhost:${VLLM_PORT:-8000}/v1/  — use model id "Qwen/Qwen3.5-2B" in requests.
#
# If port 8000 is busy, set VLLM_PORT in .env. If loading fails with qwen3_5 / Transformers errors,
# pull a newer vllm/vllm-openai:latest or install a newer Transformers inside a small custom image.
#
# "Failed to resolve huggingface.co" in the container = DNS from Docker (common on Docker Desktop /
# WSL2). The dns: list below uses public resolvers; override in .env via COMPOSE_FILE or edit if your
# network blocks them. Behind HTTP(S) proxy, set HTTP_PROXY / HTTPS_PROXY / NO_PROXY on the service.

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen35-2b
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    shm_size: "4gb"
    ipc: host
    gpus: all
    command:
      - "--model"
      - "Qwen/Qwen3.5-2B"
      # Startup failed: free VRAM < gpu-memory-utilization × total (default 0.9). Tune via .env.
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION:-0.82}"
      # Smaller context = less KV cache; model allows much more, but 8 GB GPUs need a low cap.
      - "--max-model-len"
      - "${MAX_MODEL_LEN:-8192}"
      # Text-only: drops vision encoder/profiling and saves VRAM (HF model card). Comment out if you need images/video.
      - "--language-model-only"

volumes:
  huggingface_cache:
